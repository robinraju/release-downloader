name: pr_validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup node and cache dependencies
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Validate source
        shell: bash
        run: |
          npm ci
          npm run verify

      - name: Download public release asset
        uses: ./
        id: download-public
        with:
          repository: 'robinraju/probable-potato'
          tag: '1.0.1'
          fileName: 'potato.jpeg'
          tarBall: true
          zipBall: true
          out-file-path: './test-downloads'

      - name: List downloaded files
        shell: bash
        run: ls -lrth test-downloads

      - name: Download tarball and zipball only
        uses: ./
        with:
          repository: 'robinraju/probable-potato'
          tag: '1.0.2'
          tarBall: true
          zipBall: true
          out-file-path: './public-download'

      - name: List downloaded archive files
        shell: bash
        run: ls -lrth public-download

      - name: Test download latest pre-release
        uses: ./
        with:
          repository: 'robinraju/probable-potato'
          latest: true
          preRelease: true
          fileName: 'prerelease.txt'
          tarBall: true
          zipBall: true
          out-file-path: './prerelease-downloads'

      - name: List prerelease downloads
        shell: bash
        run: ls -lrth prerelease-downloads

      - name: Read public integration outputs
        shell: bash
        run: |
          if [ -n "${{ steps.download-public.outputs.tag_name }}" ]; then
            echo "${{ steps.download-public.outputs.tag_name }}"
          else
            echo "Unable to read output variable from step download-public"
            exit 1
          fi

          echo "Downloaded public files:"
          echo '${{ steps.download-public.outputs.downloaded_files }}'
